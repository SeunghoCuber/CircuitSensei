gemini:
  model: gemini-2.5-flash
  vision_model: gemini-2.5-flash
  max_tool_rounds: 6
  retries: 3

hardware:
  mock_mode: false
  camera_index: 1
  serial_port: /dev/cu.usbmodem21301
  baud_rate: 115200
  serial_timeout_seconds: 2.0

camera:
  # On macOS, AVFoundation usually matches the default Camera app more closely
  # than OpenCV's generic backend.
  backend: avfoundation
  warmup_frames: 25
  warmup_delay_seconds: 0.04
  auto_enhance: true
  dark_threshold: 85.0
  target_brightness: 135.0
  # Optional manual tuning if your webcam still captures dark frames.
  # brightness: 0.5
  # contrast: 0.5
  # exposure: -4
  # gain: 0

overlay:
  # "reference" draws guidance on a clean breadboard diagram.
  # Use "camera" to draw guidance directly on the latest webcam frame.
  annotation_source: reference
  reference_image_path: ""
  point_radius: 20
  point_inner_radius: 6
  arrow_thickness: 5
  node_line_thickness: 7
  label_padding: 7
  label_font_scale: 0.58
  arrow_label_font_scale: 0.56
  banner_font_scale: 0.72
  banner_position: top
  banner_max_lines: 3

elevenlabs:
  # Get your voice_id from elevenlabs.io/app/voice-lab
  voice_id: "UgBBYS2sOqTuMpoF3BR0"
  tts_model: "eleven_turbo_v2_5"      # lowest latency (~400ms)
  stt_model: "scribe_v1"

paths:
  frame_path: /tmp/sensei_frame.jpg
  annotated_path: /tmp/sensei_annotated.jpg

breadboard:
  image_size: [1280, 720]
  # Standard orientation: row letters A-J run left-to-right, numbered columns
  # run top-to-bottom on the generated reference breadboard diagram.
  orientation: standard
  top_left: [650, 140]       # A1
  bottom_right: [1095, 650]  # J30
  rows: ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J"]
  columns: 30
