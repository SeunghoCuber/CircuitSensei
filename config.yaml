gemini:
  model: gemini-2.5-flash
  vision_model: gemini-2.5-flash
  max_tool_rounds: 6
  retries: 3

hardware:
  mock_mode: false
  camera_index: 1
  serial_port: /dev/cu.usbmodem21301
  baud_rate: 115200
  serial_timeout_seconds: 2.0

camera:
  # On macOS, AVFoundation usually matches the default Camera app more closely
  # than OpenCV's generic backend.
  backend: avfoundation
  warmup_frames: 25
  warmup_delay_seconds: 0.04
  auto_enhance: true
  dark_threshold: 85.0
  target_brightness: 135.0
  # Optional manual tuning if your webcam still captures dark frames.
  # brightness: 0.5
  # contrast: 0.5
  # exposure: -4
  # gain: 0

overlay:
  # "reference" draws guidance on a clean breadboard diagram.
  # Use "camera" to draw guidance directly on the latest webcam frame.
  annotation_source: reference
  reference_image_path: "frontend/public/breadboard-default.jpg"
  point_radius: 30
  point_inner_radius: 10
  arrow_thickness: 8
  carry_wire_thickness: 6
  node_line_thickness: 10
  label_padding: 12
  label_font_scale: 0.85
  arrow_label_font_scale: 0.80
  banner_font_scale: 1.05
  banner_position: bottom
  banner_max_lines: 3

elevenlabs:
  # Get your voice_id from elevenlabs.io/app/voice-lab
  voice_id: "fvVBPXuE7f1iX3dZLKFy"
  tts_model: "eleven_turbo_v2_5"      # lowest latency (~400ms)
  stt_model: "scribe_v1"

paths:
  frame_path: /tmp/sensei_frame.jpg
  annotated_path: /tmp/sensei_annotated.jpg

breadboard:
  image_size: [2162, 1484]
  # Standard orientation: row letters A-J run left-to-right (x-axis),
  # numbered columns run top-to-bottom (y-axis).
  orientation: standard
  top_left: [1425, 82]        # A1
  bottom_right: [1920, 1379]  # J30
  # Exact per-row x positions to handle the center gap between banks E and F.
  row_x_positions: [1425, 1470, 1515, 1560, 1605, 1750, 1790, 1830, 1875, 1920]
  rows: ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J"]
  columns: 30
